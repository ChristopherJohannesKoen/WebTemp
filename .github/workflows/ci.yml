name: CI

on:
  push:
    branches: ['main']
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ultimate_template
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ultimate_template"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Migration smoke
        run: npm run prisma:migrate:deploy

      - name: Seed smoke
        run: npm run seed

      - name: Build
        run: npm run build

      - name: Browser smoke
        run: npm run test:e2e
